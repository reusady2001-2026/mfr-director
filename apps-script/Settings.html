<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', Arial, sans-serif;
      font-size: 13px;
      background: #fff;
      color: #1A2332;
      padding: 24px;
    }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    p { font-size: 12px; color: #6B7A8D; line-height: 1.5; margin-bottom: 20px; }
    label { font-size: 12px; font-weight: 500; display: block; margin-bottom: 6px; color: #374151; }
    input[type=text] {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #D1D9E6;
      border-radius: 6px;
      font-family: 'IBM Plex Sans', Arial, sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    input[type=text]:focus { border-color: #4A9EFF; }
    .btn {
      width: 100%;
      padding: 10px;
      background: #1E3A5F;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'IBM Plex Sans', Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #2A4E7C; }
    .msg { margin-top: 12px; font-size: 12px; padding: 8px 10px; border-radius: 5px; display: none; }
    .msg.success { background: #EAF3DE; color: #3B6D11; display: block; }
    .msg.error { background: #FCEBEB; color: #A32D2D; display: block; }
    .hint { font-size: 11px; color: #9AAABB; margin-top: 4px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h2>Anthropic API Key</h2>
  <p>Enter your Anthropic API key. It is stored securely in your Google account's script properties and is never shared.</p>

  <label for="apiKey">API Key</label>
  <input type="text" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
  <div class="hint">Get your key at console.anthropic.com → API Keys</div>

  <button class="btn" onclick="save()">Save API Key</button>
  <div id="msg" class="msg"></div>

  <script>
    function save() {
      var key = document.getElementById('apiKey').value.trim();
      if (!key) {
        showMsg('error', 'Please enter a valid API key.');
        return;
      }
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            showMsg('success', '✓ API key saved successfully.');
            setTimeout(function() { google.script.host.close(); }, 1200);
          } else {
            showMsg('error', result.message || 'Failed to save.');
          }
        })
        .withFailureHandler(function(err) {
          showMsg('error', err.message || 'Error saving key.');
        })
        .saveApiKey(key);
    }

    function showMsg(type, text) {
      var el = document.getElementById('msg');
      el.className = 'msg ' + type;
      el.textContent = text;
    }
  </script>
</body>
</html>
